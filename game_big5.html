<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Personalidad — Big Five Conductual</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        /* Registration */
        .register-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .register-card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 440px; width: 100%; }
        .register-card h1 { font-size: 1.5rem; margin-bottom: 8px; color: #60a5fa; }
        .register-card p { font-size: 0.9rem; color: #94a3b8; margin-bottom: 24px; line-height: 1.5; }
        .register-card input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; margin-bottom: 12px; outline: none; }
        .register-card input:focus { border-color: #60a5fa; }
        .register-card select { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; margin-bottom: 16px; outline: none; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 8px; border: none; background: #3b82f6; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #475569; cursor: not-allowed; }

        /* Game container */
        .game-screen { display: none; min-height: 100vh; }
        .game-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #1e293b; border-bottom: 1px solid #334155; }
        .game-header .mini-game-label { font-size: 0.85rem; color: #60a5fa; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .game-header .progress { font-size: 0.85rem; color: #94a3b8; }
        .game-header .timer { font-size: 1.1rem; font-weight: 700; color: #fbbf24; font-variant-numeric: tabular-nums; }

        .game-area { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 24px; }

        /* Challenge card */
        .challenge-card { background: #1e293b; border-radius: 16px; padding: 32px; max-width: 600px; width: 100%; text-align: center; }
        .challenge-card h2 { font-size: 1.3rem; margin-bottom: 8px; color: #f1f5f9; }
        .challenge-card .instruction { font-size: 0.9rem; color: #94a3b8; margin-bottom: 24px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .option-btn { padding: 16px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; cursor: pointer; transition: all 0.15s; font-weight: 500; }
        .option-btn:hover { border-color: #60a5fa; background: #1e293b; transform: scale(1.02); }
        .option-btn.correct { border-color: #22c55e; background: #052e16; color: #22c55e; }
        .option-btn.wrong { border-color: #ef4444; background: #2a0a0a; color: #ef4444; }
        .option-btn.selected-opt { border-color: #60a5fa; background: #1e3a5f; }
        .option-btn:disabled { cursor: default; opacity: 0.7; }

        /* Exploration grid */
        .tile-grid { display: grid; gap: 6px; margin: 16px auto; width: fit-content; }
        .tile { width: 64px; height: 64px; border-radius: 8px; border: 2px solid #334155; background: #334155; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; transition: all 0.2s; user-select: none; }
        .tile.revealed { background: #0f172a; border-color: #60a5fa; }
        .tile:hover:not(.revealed) { border-color: #60a5fa; transform: scale(1.05); }

        /* Sorting bins */
        .sorting-area { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
        .falling-item { font-size: 2.2rem; position: absolute; transition: top 0.3s linear; user-select: none; }
        .bins-row { display: flex; justify-content: center; gap: 16px; margin-top: 16px; }
        .bin { width: 80px; height: 70px; border-radius: 12px; border: 3px dashed #475569; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; cursor: pointer; transition: all 0.15s; }
        .bin:hover { transform: scale(1.08); border-style: solid; }
        .bin.flash-correct { border-color: #22c55e; background: #052e16; }
        .bin.flash-wrong { border-color: #ef4444; background: #2a0a0a; }

        /* Speed tap */
        .tap-zone { position: relative; width: 100%; max-width: 400px; height: 300px; background: #0f172a; border-radius: 12px; border: 2px solid #334155; margin: 16px auto; overflow: hidden; }
        .tap-target { position: absolute; width: 56px; height: 56px; border-radius: 50%; background: #3b82f6; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; transition: transform 0.1s; animation: pulse-target 0.8s infinite alternate; }
        .tap-target:active { transform: scale(0.9); }
        @keyframes pulse-target { from { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); } to { box-shadow: 0 0 0 12px rgba(59,130,246,0); } }

        .choice-row { display: flex; gap: 16px; justify-content: center; margin-top: 20px; }
        .choice-btn { padding: 16px 28px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 1rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
        .choice-btn:hover { border-color: #60a5fa; background: #1e293b; }
        .choice-btn.challenge-mode { border-color: #f59e0b; color: #fbbf24; }
        .choice-btn.safe-mode { border-color: #22c55e; color: #4ade80; }

        /* Sharing slider */
        .share-slider-container { margin: 20px 0; }
        .share-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 10px; border-radius: 5px; background: #334155; outline: none; }
        .share-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%; background: #3b82f6; cursor: pointer; }
        .share-display { display: flex; justify-content: space-between; margin-top: 12px; font-size: 1.1rem; font-weight: 600; }
        .partner-message { margin: 16px 0; padding: 12px 20px; border-radius: 10px; background: #0f172a; border: 1px solid #334155; font-size: 0.9rem; color: #94a3b8; }

        /* Pressure game */
        .math-display { font-size: 2.2rem; font-weight: 700; color: #60a5fa; margin: 20px 0; font-variant-numeric: tabular-nums; }
        .pressure-timer { font-size: 1.4rem; font-weight: 700; margin: 8px 0; font-variant-numeric: tabular-nums; }
        .pressure-timer.warning { color: #ef4444; animation: pulse-warning 0.5s infinite alternate; }
        @keyframes pulse-warning { from { opacity: 1; } to { opacity: 0.5; } }
        @keyframes screen-shake { 0%,100% { transform: translate(0,0); } 25% { transform: translate(-4px,2px); } 50% { transform: translate(3px,-3px); } 75% { transform: translate(-2px,4px); } }
        .shaking { animation: screen-shake 0.15s infinite; }
        .flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(239,68,68,0.08); pointer-events: none; z-index: 100; animation: flash-anim 0.4s; }
        @keyframes flash-anim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Transition */
        .transition-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; text-align: center; }
        .transition-screen h2 { font-size: 1.8rem; margin-bottom: 12px; color: #60a5fa; }
        .transition-screen p { font-size: 1rem; color: #94a3b8; margin-bottom: 24px; max-width: 400px; line-height: 1.6; }
        .countdown { font-size: 4rem; font-weight: 700; color: #fbbf24; margin: 24px 0; }

        /* Results */
        .results-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
        .results-card { background: #1e293b; border-radius: 16px; padding: 40px; max-width: 520px; width: 100%; text-align: center; }
        .results-card h2 { font-size: 1.5rem; margin-bottom: 24px; color: #60a5fa; }
        .result-bar { margin: 12px 0; text-align: left; }
        .result-bar .label { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px; }
        .result-bar .bar { height: 12px; background: #0f172a; border-radius: 6px; overflow: hidden; }
        .result-bar .bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; }
        .bar-fill.o-bar { background: #8b5cf6; }
        .bar-fill.c-bar { background: #22c55e; }
        .bar-fill.e-bar { background: #f59e0b; }
        .bar-fill.a-bar { background: #ec4899; }
        .bar-fill.n-bar { background: #06b6d4; }

        .behavioral-stats { margin-top: 24px; padding-top: 20px; border-top: 1px solid #334155; text-align: left; }
        .behavioral-stats h3 { font-size: 0.9rem; color: #94a3b8; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; }
        .stat-row .stat-label { color: #94a3b8; }
        .stat-row .stat-value { color: #e2e8f0; font-weight: 600; }

        @media (max-width: 480px) {
            .tile { width: 52px; height: 52px; font-size: 1.2rem; }
            .challenge-card { padding: 20px; }
            .tap-zone { height: 250px; }
            .bin { width: 65px; height: 60px; }
        }
    </style>
</head>
<body>

<!-- ===== REGISTRATION ===== -->
<div class="register-screen" id="registerScreen">
    <div class="register-card">
        <h1>🎮 Juego de Personalidad</h1>
        <p>5 mini-juegos interactivos que miden rasgos conductuales de personalidad (Big Five). No hay respuestas "correctas" — juega de forma natural. Toma ~8-10 minutos.</p>
        <input type="text" id="regName" placeholder="Nombre completo" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="tel" id="regPhone" placeholder="Telefono">
        <select id="regPosition">
            <option value="">Selecciona posicion...</option>
            <option value="almacen">Almacen</option>
            <option value="ventas_mostrador">Ventas a Mostrador</option>
            <option value="pueblaventas">Puebla Ventas</option>
            <option value="internal_team">Equipo Interno (correlacion)</option>
        </select>
        <button class="btn-primary" id="startBtn" onclick="startGame()">Comenzar Juego</button>
    </div>
</div>

<!-- ===== GAME AREA ===== -->
<div class="game-screen" id="gameScreen">
    <div class="game-header">
        <span class="mini-game-label" id="miniGameLabel">Exploracion</span>
        <span class="progress" id="progressLabel">1/5</span>
        <span class="timer" id="timerLabel">0:00</span>
    </div>
    <div class="game-area" id="gameArea"></div>
</div>

<!-- ===== TRANSITION ===== -->
<div class="transition-screen" id="transitionScreen">
    <h2 id="transTitle">Siguiente Juego</h2>
    <p id="transDesc">Descripcion del siguiente juego.</p>
    <div class="countdown" id="transCountdown">3</div>
</div>

<!-- ===== RESULTS ===== -->
<div class="results-screen" id="resultsScreen">
    <div class="results-card" id="resultsCard"></div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_BASE = window.location.origin;
const SUPABASE_URL = 'https://gbkhkbfbarsnpbdkxzii.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdia2hrYmZiYXJzbnBiZGt4emlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQzODAzNzMsImV4cCI6MjA0OTk1NjM3M30.mcOcC2GVEu_wD3xNBzSCC3MwDck3CIdmz4D8adU-bpI';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

// Auto-fill from URL params (when coming from /games menu)
const urlParams = new URLSearchParams(window.location.search);
const prefillEmail = urlParams.get('email');
window.addEventListener('DOMContentLoaded', () => {
    if (prefillEmail) {
        document.getElementById('regEmail').value = prefillEmail;
        document.getElementById('regEmail').readOnly = true;
        document.getElementById('regEmail').style.opacity = '0.7';
    }
});

// ============================================================
// STATE
// ============================================================
let player = {};
let sessionId = null;
let gameStartTime = 0;
let events = [];
let currentMiniGame = 0;
let miniGameTimer = null;
let miniGameStartTime = 0;

const miniGames = ['exploration', 'sorting', 'speedtap', 'sharing', 'pressure'];
const miniGameLabels = {
    exploration: { name: 'Exploracion', icon: '🔍', desc: 'Descubre las estrellas ocultas bajo las casillas. Explora cuanto quieras.' },
    sorting: { name: 'Clasificacion', icon: '🎯', desc: 'Arrastra cada figura al contenedor de su color. Se preciso y rapido.' },
    speedtap: { name: 'Velocidad', icon: '⚡', desc: 'Toca los objetivos lo mas rapido que puedas. Elige tu nivel de desafio.' },
    sharing: { name: 'Colaboracion', icon: '🤝', desc: 'Decide cuantos puntos compartir con tu companero virtual en cada ronda.' },
    pressure: { name: 'Bajo Presion', icon: '🧠', desc: 'Resuelve operaciones matematicas. Mantente concentrado sin importar las distracciones.' }
};

// Scores per Big Five trait
let traitData = {
    O: { raw: 0, details: {} },
    C: { raw: 0, details: {} },
    E: { raw: 0, details: {} },
    A: { raw: 0, details: {} },
    N: { raw: 0, details: {} }
};

// ============================================================
// GAME FLOW
// ============================================================

async function startGame() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const position = document.getElementById('regPosition').value;

    if (!name || !email) { alert('Nombre y email son requeridos'); return; }

    player = { name, email, phone, position };
    gameStartTime = Date.now();

    // Create session in Supabase
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/game_sessions`, {
            method: 'POST', headers: HEADERS,
            body: JSON.stringify({
                email, name, phone, position,
                game_type: 'game_big5',
                test_equivalent: 'big5',
                user_agent: navigator.userAgent,
                screen_width: screen.width,
                screen_height: screen.height,
                status: 'in_progress'
            })
        });
        const data = await res.json();
        if (data && data[0]) sessionId = data[0].id;
    } catch (e) { console.warn('Session save failed:', e); }

    document.getElementById('registerScreen').style.display = 'none';
    showTransition(0);
}

function showTransition(mgIndex) {
    currentMiniGame = mgIndex;
    const mg = miniGames[mgIndex];
    const info = miniGameLabels[mg];

    document.getElementById('gameScreen').style.display = 'none';
    const ts = document.getElementById('transitionScreen');
    ts.style.display = 'flex';
    document.getElementById('transTitle').textContent = `${info.icon} ${info.name}`;
    document.getElementById('transDesc').textContent = info.desc;

    let count = 3;
    document.getElementById('transCountdown').textContent = count;
    const iv = setInterval(() => {
        count--;
        if (count <= 0) {
            clearInterval(iv);
            ts.style.display = 'none';
            startMiniGame(mgIndex);
        } else {
            document.getElementById('transCountdown').textContent = count;
        }
    }, 1000);
}

function startMiniGame(mgIndex) {
    const gs = document.getElementById('gameScreen');
    gs.style.display = 'block';
    miniGameStartTime = Date.now();

    const mg = miniGames[mgIndex];
    const info = miniGameLabels[mg];
    document.getElementById('miniGameLabel').textContent = `${info.icon} ${info.name}`;
    document.getElementById('progressLabel').textContent = `${mgIndex + 1}/5`;

    clearInterval(miniGameTimer);
    miniGameTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - miniGameStartTime) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        document.getElementById('timerLabel').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 200);

    if (mg === 'exploration') startExploration();
    else if (mg === 'sorting') startSorting();
    else if (mg === 'speedtap') startSpeedTap();
    else if (mg === 'sharing') startSharing();
    else if (mg === 'pressure') startPressure();
}

function endMiniGame() {
    clearInterval(miniGameTimer);
    currentMiniGame++;
    if (currentMiniGame < miniGames.length) {
        showTransition(currentMiniGame);
    } else {
        finishGame();
    }
}

function recordEvent(miniGame, eventIndex, dimension, reactionTime, response, correct) {
    events.push({
        session_id: sessionId,
        mini_game: miniGame,
        event_type: 'response',
        event_index: eventIndex,
        timestamp_ms: Date.now() - gameStartTime,
        reaction_time_ms: reactionTime,
        response: response,
        correct: correct,
        dimension: dimension,
        hesitation_ms: null,
        attempts: 1
    });
}

// ============================================================
// MINI-GAME 1: EXPLORATION (O - Apertura)
// ============================================================

function startExploration() {
    runExplorationRound(3, 1, () => {
        runExplorationRound(4, 2, () => {
            calculateExplorationScore();
            endMiniGame();
        });
    });
}

let explorationData = { rounds: [] };

function runExplorationRound(gridSize, roundNum, onComplete) {
    const area = document.getElementById('gameArea');
    const total = gridSize * gridSize;

    // Place stars on ~30% of tiles
    const starCount = Math.max(2, Math.floor(total * 0.3));
    const starPositions = [];
    while (starPositions.length < starCount) {
        const r = Math.floor(Math.random() * total);
        if (!starPositions.includes(r)) starPositions.push(r);
    }

    // Hidden rewards on tiles (points)
    const rewards = [];
    for (let i = 0; i < total; i++) {
        rewards.push(starPositions.includes(i) ? '⭐' : ['🔹', '🔸', '💎', '🌙'][Math.floor(Math.random() * 4)]);
    }

    let revealedTiles = [];
    let revealOrder = [];
    const roundStart = Date.now();

    let gridHTML = `
        <div class="challenge-card">
            <h2>Ronda ${roundNum} de 2 — Cuadricula ${gridSize}x${gridSize}</h2>
            <div class="instruction">Toca las casillas para descubrir que hay debajo. Explora cuanto quieras y presiona "Continuar" cuando termines.</div>
            <div class="tile-grid" style="grid-template-columns: repeat(${gridSize}, 1fr);" id="exploGrid">`;
    for (let i = 0; i < total; i++) {
        gridHTML += `<div class="tile" data-idx="${i}" id="tile${i}">?</div>`;
    }
    gridHTML += `</div>
        <p style="margin-top:12px; color:#94a3b8; font-size:0.85rem;">Descubiertas: <span id="revCount">0</span>/${total} &nbsp;|&nbsp; Estrellas: <span id="starCount">0</span></p>
        <button class="btn-primary" style="margin-top:16px;" onclick="window._endExploRound()">Continuar</button>
    </div>`;

    area.innerHTML = gridHTML;

    let starsFound = 0;

    document.querySelectorAll('#exploGrid .tile').forEach(tile => {
        tile.addEventListener('click', function() {
            const idx = parseInt(this.dataset.idx);
            if (revealedTiles.includes(idx)) return;
            revealedTiles.push(idx);
            revealOrder.push({ idx, time: Date.now() - roundStart });
            this.classList.add('revealed');
            this.textContent = rewards[idx];
            if (starPositions.includes(idx)) starsFound++;
            document.getElementById('revCount').textContent = revealedTiles.length;
            document.getElementById('starCount').textContent = starsFound;
        });
    });

    window._endExploRound = () => {
        const duration = Date.now() - roundStart;
        const explorationRate = revealedTiles.length / total;

        // Detect pattern: systematic vs random
        let systematicScore = 0;
        for (let i = 1; i < revealOrder.length; i++) {
            const prev = revealOrder[i - 1].idx;
            const curr = revealOrder[i].idx;
            const diff = Math.abs(curr - prev);
            if (diff === 1 || diff === gridSize) systematicScore++;
        }
        const systematicRatio = revealOrder.length > 1 ? systematicScore / (revealOrder.length - 1) : 0;

        explorationData.rounds.push({
            gridSize, total, revealed: revealedTiles.length, explorationRate,
            starsFound, starCount, systematicRatio, duration, revealOrder
        });

        recordEvent('exploration', roundNum - 1, 'O', duration, { revealed: revealedTiles.length, total, explorationRate, systematicRatio }, null);
        onComplete();
    };
}

function calculateExplorationScore() {
    const rounds = explorationData.rounds;
    const avgExplorationRate = rounds.reduce((s, r) => s + r.explorationRate, 0) / rounds.length;
    const avgSystematic = rounds.reduce((s, r) => s + r.systematicRatio, 0) / rounds.length;

    // More exploration = higher O. Curiosity drives exploration.
    // Score: 70% exploration rate, 30% willingness to explore beyond what's needed
    const score = Math.round(avgExplorationRate * 35 + (1 - avgSystematic) * 15);
    traitData.O.raw = Math.min(50, Math.max(5, score));
    traitData.O.details = { exploration_rate: Math.round(avgExplorationRate * 100) / 100, systematic_ratio: Math.round(avgSystematic * 100) / 100 };
}

// ============================================================
// MINI-GAME 2: SORTING PRECISION (C - Responsabilidad)
// ============================================================

let sortingData = { correct: 0, total: 0, errors: [], streaks: [], currentStreak: 0 };

function startSorting() {
    sortingData = { correct: 0, total: 20, errors: [], streaks: [], currentStreak: 0, times: [] };
    runSortingItem(0);
}

function runSortingItem(index) {
    if (index >= 20) {
        calculateSortingScore();
        endMiniGame();
        return;
    }

    const area = document.getElementById('gameArea');
    const shapes = [
        { emoji: '🔴', color: '#ef4444', name: 'Rojo' },
        { emoji: '🔵', color: '#3b82f6', name: 'Azul' },
        { emoji: '🟢', color: '#22c55e', name: 'Verde' }
    ];
    const correctShape = shapes[Math.floor(Math.random() * 3)];

    // Speed increases with index
    const timeLimit = Math.max(2000, 5000 - index * 120);
    const itemStart = Date.now();

    area.innerHTML = `
        <div class="challenge-card">
            <h2>Clasifica la Figura</h2>
            <div class="instruction">Arrastra — presiona el contenedor correcto. Item ${index + 1}/20</div>
            <div style="font-size:4rem; margin:20px 0;" id="sortItem">${correctShape.emoji}</div>
            <div class="pressure-timer" id="sortTimer">${(timeLimit/1000).toFixed(1)}s</div>
            <div class="bins-row">
                ${shapes.map((s, i) => `<div class="bin" data-color="${s.name}" onclick="window._sortAnswer('${s.name}', '${correctShape.name}', ${index})" style="border-color:${s.color};">${s.emoji}</div>`).join('')}
            </div>
        </div>`;

    let timeLeft = timeLimit;
    const timerIv = setInterval(() => {
        timeLeft -= 100;
        document.getElementById('sortTimer').textContent = (timeLeft / 1000).toFixed(1) + 's';
        if (timeLeft <= 0) {
            clearInterval(timerIv);
            // Timeout = wrong
            window._sortAnswer(null, correctShape.name, index, true);
        }
    }, 100);

    window._sortAnswer = (chosen, correct, idx, timeout = false) => {
        clearInterval(timerIv);
        const rt = Date.now() - itemStart;
        const isCorrect = chosen === correct;

        if (isCorrect) {
            sortingData.correct++;
            sortingData.currentStreak++;
        } else {
            sortingData.streaks.push(sortingData.currentStreak);
            sortingData.currentStreak = 0;
            sortingData.errors.push(idx);
        }
        sortingData.times.push(rt);

        // Flash feedback on bins
        document.querySelectorAll('.bin').forEach(b => {
            if (b.dataset.color === correct) b.classList.add('flash-correct');
            else if (b.dataset.color === chosen && !isCorrect) b.classList.add('flash-wrong');
        });

        recordEvent('sorting', idx, 'C', rt, { chosen, correct, timeout }, isCorrect);
        setTimeout(() => runSortingItem(idx + 1), 500);
    };
}

function calculateSortingScore() {
    sortingData.streaks.push(sortingData.currentStreak);
    const accuracy = sortingData.correct / sortingData.total;
    const avgTime = sortingData.times.reduce((a, b) => a + b, 0) / sortingData.times.length;
    const maxStreak = Math.max(...sortingData.streaks);

    // Higher accuracy = higher C
    const score = Math.round(accuracy * 40 + (maxStreak / 20) * 10);
    traitData.C.raw = Math.min(50, Math.max(5, score));
    traitData.C.details = { sorting_accuracy: Math.round(accuracy * 100) / 100, avg_sort_time_ms: Math.round(avgTime), max_streak: maxStreak, errors: sortingData.errors.length };
}

// ============================================================
// MINI-GAME 3: SPEED TAP (E - Extraversion)
// ============================================================

let speedTapData = { tapTimes: [], challengeChoices: [], totalTaps: 0 };

function startSpeedTap() {
    speedTapData = { tapTimes: [], challengeChoices: [], totalTaps: 0 };
    runTapPhase(0, 15, () => {
        runChoiceRound(0, () => {
            calculateSpeedTapScore();
            endMiniGame();
        });
    });
}

function runTapPhase(index, total, onComplete) {
    if (index >= total) { onComplete(); return; }

    const area = document.getElementById('gameArea');
    area.innerHTML = `
        <div class="challenge-card">
            <h2>Toca el Objetivo</h2>
            <div class="instruction">Toca el circulo lo mas rapido posible. Objetivo ${index + 1}/${total}</div>
            <div class="tap-zone" id="tapZone"></div>
        </div>`;

    // Show target after random delay
    setTimeout(() => {
        const zone = document.getElementById('tapZone');
        if (!zone) return;
        const x = Math.floor(Math.random() * (zone.offsetWidth - 56));
        const y = Math.floor(Math.random() * (zone.offsetHeight - 56));
        const tapStart = Date.now();

        zone.innerHTML = `<div class="tap-target" style="left:${x}px; top:${y}px;" id="tapTarget">🎯</div>`;
        document.getElementById('tapTarget').addEventListener('click', function() {
            const rt = Date.now() - tapStart;
            speedTapData.tapTimes.push(rt);
            speedTapData.totalTaps++;
            this.style.background = '#22c55e';
            this.textContent = '✓';
            recordEvent('speedtap', index, 'E', rt, { phase: 'tap' }, true);
            setTimeout(() => runTapPhase(index + 1, total, onComplete), 300);
        });
    }, 300 + Math.random() * 700);
}

function runChoiceRound(index, onComplete) {
    if (index >= 3) { onComplete(); return; }

    const area = document.getElementById('gameArea');
    area.innerHTML = `
        <div class="challenge-card">
            <h2>Elige tu Modo</h2>
            <div class="instruction">Ronda de decision ${index + 1}/3: ¿Como quieres jugar?</div>
            <div class="choice-row">
                <button class="choice-btn challenge-mode" onclick="window._choiceSelect('challenge', ${index})">🔥 Modo Desafio<br><small>Mas rapido, 2x puntos</small></button>
                <button class="choice-btn safe-mode" onclick="window._choiceSelect('safe', ${index})">🛡 Modo Seguro<br><small>Ritmo normal</small></button>
            </div>
        </div>`;

    window._choiceSelect = (choice, idx) => {
        speedTapData.challengeChoices.push(choice);
        recordEvent('speedtap', 15 + idx, 'E', 0, { choice }, null);

        // Play a quick tap round based on choice
        const count = choice === 'challenge' ? 3 : 2;
        runTapPhase(0, count, () => runChoiceRound(idx + 1, onComplete));
    };
}

function calculateSpeedTapScore() {
    const avgRT = speedTapData.tapTimes.length > 0 ? speedTapData.tapTimes.reduce((a, b) => a + b, 0) / speedTapData.tapTimes.length : 5000;
    const challengeRate = speedTapData.challengeChoices.filter(c => c === 'challenge').length / Math.max(1, speedTapData.challengeChoices.length);

    // Faster RT + more challenge choices = higher E
    const speedScore = Math.max(0, 1 - avgRT / 2000); // normalize around 2s
    const score = Math.round(speedScore * 25 + challengeRate * 25);
    traitData.E.raw = Math.min(50, Math.max(5, score));
    traitData.E.details = { avg_tap_speed_ms: Math.round(avgRT), challenge_rate: Math.round(challengeRate * 100) / 100, total_taps: speedTapData.totalTaps };
}

// ============================================================
// MINI-GAME 4: SHARING GAME (A - Amabilidad)
// ============================================================

let sharingData = { rounds: [], shares: [] };

function startSharing() {
    sharingData = { rounds: [], shares: [] };
    // Partner behavior pattern: cooperate, cooperate, defect, cooperate, cooperate, defect
    const partnerBehavior = ['cooperate', 'cooperate', 'defect', 'cooperate', 'cooperate', 'defect'];
    runSharingRound(0, partnerBehavior, 0);
}

function runSharingRound(index, partnerBehavior, partnerTotal) {
    if (index >= 6) {
        calculateSharingScore(partnerBehavior);
        endMiniGame();
        return;
    }

    const area = document.getElementById('gameArea');
    const prevBehavior = index > 0 ? partnerBehavior[index - 1] : null;
    let partnerMsg = '';
    if (index === 0) {
        partnerMsg = '💬 "Hola, espero que podamos cooperar bien juntos."';
    } else if (prevBehavior === 'cooperate') {
        const shared = 30 + Math.floor(Math.random() * 30);
        partnerMsg = `💬 "Gracias por tu generosidad. Yo te comparto ${shared} puntos."`;
    } else {
        partnerMsg = '💬 "Lo siento, esta vez preferi guardarme todo. Necesitaba los puntos."';
    }

    area.innerHTML = `
        <div class="challenge-card">
            <h2>Ronda ${index + 1} de 6</h2>
            <div class="instruction">Tienes 100 puntos. ¿Cuantos compartes con tu companero?</div>
            <div class="partner-message">${partnerMsg}</div>
            <div class="share-slider-container">
                <input type="range" class="share-slider" id="shareSlider" min="0" max="100" value="50" oninput="window._updateShare()">
                <div class="share-display">
                    <span>Tu: <span id="keepDisplay" style="color:#60a5fa;">50</span></span>
                    <span>Companero: <span id="shareDisplay" style="color:#f59e0b;">50</span></span>
                </div>
            </div>
            <button class="btn-primary" style="margin-top:16px;" onclick="window._confirmShare(${index})">Confirmar</button>
        </div>`;

    window._updateShare = () => {
        const val = parseInt(document.getElementById('shareSlider').value);
        document.getElementById('shareDisplay').textContent = val;
        document.getElementById('keepDisplay').textContent = 100 - val;
    };

    window._confirmShare = (idx) => {
        const shared = parseInt(document.getElementById('shareSlider').value);
        sharingData.shares.push(shared);
        sharingData.rounds.push({
            round: idx,
            shared: shared,
            partnerBehavior: partnerBehavior[idx],
            prevPartner: idx > 0 ? partnerBehavior[idx - 1] : null
        });

        recordEvent('sharing', idx, 'A', 0, { shared, partnerBehavior: partnerBehavior[idx] }, null);
        setTimeout(() => runSharingRound(idx + 1, partnerBehavior, partnerTotal), 600);
    };
}

function calculateSharingScore(partnerBehavior) {
    const avgShare = sharingData.shares.reduce((a, b) => a + b, 0) / sharingData.shares.length;
    const generosityRatio = avgShare / 100;

    // Forgiveness: after a defection, does the player still share?
    let forgivenessScores = [];
    for (let i = 1; i < sharingData.rounds.length; i++) {
        if (sharingData.rounds[i].prevPartner === 'defect') {
            forgivenessScores.push(sharingData.shares[i] / 100);
        }
    }
    const forgivenessRatio = forgivenessScores.length > 0 ? forgivenessScores.reduce((a, b) => a + b, 0) / forgivenessScores.length : 0.5;

    // More generous + forgiving = higher A
    const score = Math.round(generosityRatio * 30 + forgivenessRatio * 20);
    traitData.A.raw = Math.min(50, Math.max(5, score));
    traitData.A.details = { generosity_ratio: Math.round(generosityRatio * 100) / 100, forgiveness_ratio: Math.round(forgivenessRatio * 100) / 100, avg_share: Math.round(avgShare) };
}

// ============================================================
// MINI-GAME 5: PRESSURE GAME (N - Estabilidad Emocional)
// ============================================================

let pressureData = { calm: [], pressure: [] };

function startPressure() {
    pressureData = { calm: [], pressure: [] };
    runPressureRound(0);
}

function generateMathProblem() {
    const ops = ['+', '-', '*'];
    const op = ops[Math.floor(Math.random() * 3)];
    let a, b, answer;
    if (op === '+') {
        a = Math.floor(Math.random() * 50) + 10;
        b = Math.floor(Math.random() * 50) + 10;
        answer = a + b;
    } else if (op === '-') {
        a = Math.floor(Math.random() * 50) + 30;
        b = Math.floor(Math.random() * 30) + 5;
        answer = a - b;
    } else {
        a = Math.floor(Math.random() * 12) + 2;
        b = Math.floor(Math.random() * 12) + 2;
        answer = a * b;
    }

    // Generate wrong options
    const options = [answer];
    while (options.length < 4) {
        const wrong = answer + (Math.floor(Math.random() * 20) - 10);
        if (wrong !== answer && !options.includes(wrong) && wrong >= 0) options.push(wrong);
    }
    // Shuffle
    for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
    }
    const correctIdx = options.indexOf(answer);

    return { display: `${a} ${op === '*' ? '×' : op} ${b} = ?`, answer, options, correctIdx };
}

function runPressureRound(index) {
    if (index >= 8) {
        calculatePressureScore();
        endMiniGame();
        return;
    }

    const isPressure = index >= 4;
    const timeLimit = isPressure ? 4000 : 8000;
    const problem = generateMathProblem();
    const area = document.getElementById('gameArea');
    const roundStart = Date.now();

    const phaseLabel = isPressure ? '⚠️ FASE DE PRESION' : '😌 Fase Tranquila';
    const phaseSub = isPressure ? 'Resuelve rapido bajo presion' : 'Resuelve a tu ritmo';

    area.innerHTML = `
        <div class="challenge-card" id="pressureCard" ${isPressure ? 'class="shaking"' : ''}>
            <div style="font-size:0.8rem; color:${isPressure ? '#ef4444' : '#94a3b8'}; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;">${phaseLabel}</div>
            <h2>Problema ${index + 1} de 8</h2>
            <div class="instruction">${phaseSub}</div>
            <div class="math-display">${problem.display}</div>
            <div class="pressure-timer ${isPressure ? 'warning' : ''}" id="pressureTimer">${(timeLimit/1000).toFixed(1)}s</div>
            <div class="options-grid">
                ${problem.options.map((o, i) => `<button class="option-btn" onclick="window._pressureAnswer(${i}, ${problem.correctIdx}, ${index})" id="popt${i}">${o}</button>`).join('')}
            </div>
        </div>`;

    if (isPressure) {
        document.getElementById('pressureCard').classList.add('shaking');
        // Random distracting flashes
        const flashIv = setInterval(() => {
            const flash = document.createElement('div');
            flash.className = 'flash-overlay';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 400);
        }, 1200 + Math.random() * 800);
        window._pressureFlashIv = flashIv;
    }

    let timeLeft = timeLimit;
    const timerIv = setInterval(() => {
        timeLeft -= 100;
        const timerEl = document.getElementById('pressureTimer');
        if (timerEl) timerEl.textContent = (timeLeft / 1000).toFixed(1) + 's';
        if (timeLeft <= 0) {
            clearInterval(timerIv);
            if (window._pressureFlashIv) clearInterval(window._pressureFlashIv);
            handlePressureResult(index, isPressure, false, Date.now() - roundStart, problem);
        }
    }, 100);

    window._pressureAnswer = (selected, correct, idx) => {
        clearInterval(timerIv);
        if (window._pressureFlashIv) clearInterval(window._pressureFlashIv);
        const rt = Date.now() - roundStart;
        const isCorrect = selected === correct;

        document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
        document.getElementById(`popt${selected}`).classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) document.getElementById(`popt${correct}`).classList.add('correct');

        handlePressureResult(idx, isPressure, isCorrect, rt, problem);
    };
}

function handlePressureResult(index, isPressure, isCorrect, rt, problem) {
    const phase = isPressure ? 'pressure' : 'calm';
    pressureData[phase].push({ correct: isCorrect, rt });

    // Remove shaking
    const card = document.getElementById('pressureCard');
    if (card) card.classList.remove('shaking');
    // Remove any flash overlays
    document.querySelectorAll('.flash-overlay').forEach(f => f.remove());

    recordEvent('pressure', index, 'N', rt, { phase, correct: isCorrect }, isCorrect);
    setTimeout(() => runPressureRound(index + 1), 700);
}

function calculatePressureScore() {
    const calmAcc = pressureData.calm.length > 0 ? pressureData.calm.filter(r => r.correct).length / pressureData.calm.length : 0;
    const pressureAcc = pressureData.pressure.length > 0 ? pressureData.pressure.filter(r => r.correct).length / pressureData.pressure.length : 0;
    const accuracyDrop = calmAcc - pressureAcc;

    const calmRT = pressureData.calm.length > 0 ? pressureData.calm.reduce((s, r) => s + r.rt, 0) / pressureData.calm.length : 5000;
    const pressureRT = pressureData.pressure.length > 0 ? pressureData.pressure.reduce((s, r) => s + r.rt, 0) / pressureData.pressure.length : 5000;

    // LESS accuracy drop = HIGHER N (emotional stability)
    // If accuracy stays the same or improves under pressure, max score
    const dropFactor = Math.max(0, 1 - accuracyDrop * 2); // 0% drop = 1.0, 50% drop = 0.0
    const baseAcc = (calmAcc + pressureAcc) / 2;
    const score = Math.round(dropFactor * 35 + baseAcc * 15);
    traitData.N.raw = Math.min(50, Math.max(5, score));
    traitData.N.details = {
        calm_accuracy: Math.round(calmAcc * 100) / 100,
        pressure_accuracy: Math.round(pressureAcc * 100) / 100,
        pressure_accuracy_drop: Math.round(accuracyDrop * 100) / 100,
        calm_avg_rt_ms: Math.round(calmRT),
        pressure_avg_rt_ms: Math.round(pressureRT)
    };
}

// ============================================================
// FINISH & SCORE
// ============================================================

async function finishGame() {
    document.getElementById('gameScreen').style.display = 'none';
    const totalDuration = Date.now() - gameStartTime;

    const scores = {
        O: traitData.O.raw,
        C: traitData.C.raw,
        E: traitData.E.raw,
        A: traitData.A.raw,
        N: traitData.N.raw
    };

    const percentages = {};
    for (const t of ['O', 'C', 'E', 'A', 'N']) {
        percentages[t] = Math.round((scores[t] / 50) * 1000) / 10;
    }

    // Find dominant trait
    let maxTrait = 'O';
    for (const t of ['C', 'E', 'A', 'N']) {
        if (scores[t] > scores[maxTrait]) maxTrait = t;
    }
    const traitNames = {
        O: 'Apertura a la Experiencia',
        C: 'Responsabilidad',
        E: 'Extraversion',
        A: 'Amabilidad',
        N: 'Estabilidad Emocional'
    };

    const behavioralMetrics = {
        exploration_rate: traitData.O.details.exploration_rate || 0,
        systematic_ratio: traitData.O.details.systematic_ratio || 0,
        sorting_accuracy: traitData.C.details.sorting_accuracy || 0,
        max_streak: traitData.C.details.max_streak || 0,
        avg_tap_speed_ms: traitData.E.details.avg_tap_speed_ms || 0,
        challenge_rate: traitData.E.details.challenge_rate || 0,
        generosity_ratio: traitData.A.details.generosity_ratio || 0,
        forgiveness_ratio: traitData.A.details.forgiveness_ratio || 0,
        pressure_accuracy_drop: traitData.N.details.pressure_accuracy_drop || 0,
        calm_accuracy: traitData.N.details.calm_accuracy || 0,
        pressure_accuracy: traitData.N.details.pressure_accuracy || 0,
        total_duration_ms: totalDuration
    };

    // Save to Supabase
    try {
        if (events.length > 0 && sessionId) {
            await fetch(`${SUPABASE_URL}/rest/v1/game_events`, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify(events)
            });
        }

        const resultData = {
            session_id: sessionId,
            email: player.email,
            game_type: 'game_big5',
            test_equivalent: 'big5',
            scores: scores,
            percentages: percentages,
            dominant_trait: traitNames[maxTrait],
            description: `Rasgo dominante: ${traitNames[maxTrait]} (${percentages[maxTrait]}%).`,
            behavioral_metrics: behavioralMetrics
        };

        await fetch(`${SUPABASE_URL}/rest/v1/game_results`, {
            method: 'POST', headers: HEADERS,
            body: JSON.stringify(resultData)
        });

        if (sessionId) {
            await fetch(`${SUPABASE_URL}/rest/v1/game_sessions?id=eq.${sessionId}`, {
                method: 'PATCH', headers: HEADERS,
                body: JSON.stringify({ status: 'completed', completed_at: new Date().toISOString(), duration_ms: totalDuration })
            });
        }
    } catch (e) { console.warn('Save failed:', e); }

    showResults(scores, percentages, maxTrait, traitNames, behavioralMetrics);
}

function showResults(scores, percentages, maxTrait, traitNames, bm) {
    const rs = document.getElementById('resultsScreen');
    rs.style.display = 'flex';

    const barClasses = { O: 'o-bar', C: 'c-bar', E: 'e-bar', A: 'a-bar', N: 'n-bar' };

    let barsHTML = '';
    for (const t of ['O', 'C', 'E', 'A', 'N']) {
        barsHTML += `
            <div class="result-bar">
                <div class="label"><span>${traitNames[t]}</span><span>${percentages[t]}%</span></div>
                <div class="bar"><div class="bar-fill ${barClasses[t]}" data-trait="${t}" style="width: 0%"></div></div>
            </div>`;
    }

    document.getElementById('resultsCard').innerHTML = `
        <h2>🎮 Resultados — Perfil Big Five</h2>
        <p style="color:#60a5fa; font-size:1.1rem; font-weight:600; margin-bottom:4px;">Rasgo Dominante: ${traitNames[maxTrait]}</p>
        <p style="color:#94a3b8; margin-bottom:24px; font-size:0.9rem;">${percentages[maxTrait]}% — Medido a traves de tu comportamiento en los juegos</p>
        ${barsHTML}
        <div class="behavioral-stats">
            <h3>📊 Metricas Conductuales</h3>
            <div class="stat-row"><span class="stat-label">Tasa de exploracion</span><span class="stat-value">${Math.round((bm.exploration_rate || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Precision de clasificacion</span><span class="stat-value">${Math.round((bm.sorting_accuracy || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Velocidad promedio de toque</span><span class="stat-value">${bm.avg_tap_speed_ms}ms</span></div>
            <div class="stat-row"><span class="stat-label">Ratio de generosidad</span><span class="stat-value">${Math.round((bm.generosity_ratio || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Ratio de perdon</span><span class="stat-value">${Math.round((bm.forgiveness_ratio || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Caida de precision bajo presion</span><span class="stat-value">${Math.round((bm.pressure_accuracy_drop || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Tasa de desafio elegido</span><span class="stat-value">${Math.round((bm.challenge_rate || 0) * 100)}%</span></div>
            <div class="stat-row"><span class="stat-label">Duracion total</span><span class="stat-value">${Math.round(bm.total_duration_ms / 1000)}s</span></div>
        </div>
    `;

    // Animate bars
    setTimeout(() => {
        document.querySelectorAll('.bar-fill[data-trait]').forEach(bar => {
            const t = bar.dataset.trait;
            bar.style.width = percentages[t] + '%';
        });
    }, 200);
}
