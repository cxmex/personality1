// ============================================================
// UTILITY: SHUFFLE ARRAY
// ============================================================
function shuffleArray(arr) {
    const shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

// ============================================================
// GAME FLOW
// ============================================================

async function startGame() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const position = document.getElementById('regPosition').value;

    if (!name || !email) { alert('Nombre y email son requeridos'); return; }

    player = { name, email, phone, position };
    gameStartTime = Date.now();

    // Create session in Supabase
    try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/game_sessions`, {
            method: 'POST', headers: HEADERS,
            body: JSON.stringify({
                email, name, phone, position,
                game_type: 'game_competencias',
                test_equivalent: 'competencias',
                user_agent: navigator.userAgent,
                screen_width: screen.width,
                screen_height: screen.height,
                status: 'in_progress'
            })
        });
        const data = await res.json();
        if (data && data[0]) sessionId = data[0].id;
    } catch (e) { console.warn('Session save failed:', e); }

    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';

    // Start global timer
    gameTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
        const m = Math.floor(elapsed / 60);
        const s = elapsed % 60;
        document.getElementById('timerLabel').textContent = `${m}:${s.toString().padStart(2, '0')}`;
    }, 200);

    showScenario(0);
}

function showScenario(index) {
    if (index >= SCENARIOS.length) {
        finishGame();
        return;
    }

    currentScenario = index;
    scenarioStartTime = Date.now();

    const sc = SCENARIOS[index];
    const comp = COMPETENCIES[sc.competency];
    const shuffledOptions = shuffleArray(sc.options.map((o, i) => ({ ...o, originalIndex: i })));

    // Update progress
    document.getElementById('progressLabel').textContent = `${index + 1}/${SCENARIOS.length}`;
    document.getElementById('progressBar').style.width = `${((index + 1) / SCENARIOS.length) * 100}%`;

    const area = document.getElementById('gameArea');
    area.innerHTML = `
        <div class="scenario-card">
            <div class="scenario-emoji">${sc.emoji}</div>
            <div class="scenario-comp">${comp.emoji} ${comp.name}</div>
            <div class="scenario-title">${sc.title}</div>
            <div class="scenario-text">${sc.text}</div>
            <div class="options-list">
                ${shuffledOptions.map((o, i) => `<button class="option-btn" onclick="answerScenario(${index}, ${i})" id="opt${i}" data-score="${o.score}">${o.text}</button>`).join('')}
            </div>
        </div>`;
}

function answerScenario(scenarioIdx, optionIdx) {
    const rt = Date.now() - scenarioStartTime;
    const sc = SCENARIOS[scenarioIdx];
    const btn = document.getElementById(`opt${optionIdx}`);
    const score = parseInt(btn.dataset.score);

    // Record raw score
    rawScores[sc.competency] += score;
    reactionTimes[sc.competency].push(rt);

    // Disable all buttons
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

    // Visual feedback: green for 3-4, yellow for 1-2
    if (score >= 3) {
        btn.classList.add('feedback-good');
    } else {
        btn.classList.add('feedback-ok');
    }

    // Record event
    events.push({
        session_id: sessionId,
        mini_game: 'competencias',
        event_type: 'response',
        event_index: scenarioIdx,
        timestamp_ms: Date.now() - gameStartTime,
        reaction_time_ms: rt,
        response: { scenario: scenarioIdx, competency: sc.competency, score: score, option_selected: optionIdx },
        correct: score >= 3,
        dimension: sc.competency,
        hesitation_ms: null,
        attempts: 1
    });

    setTimeout(() => {
        showScenario(scenarioIdx + 1);
    }, 700);
}

// ============================================================
// FINISH & SCORE
// ============================================================

async function finishGame() {
    clearInterval(gameTimer);
    document.getElementById('gameScreen').style.display = 'none';
    const totalDuration = Date.now() - gameStartTime;

    // Calculate scaled scores and percentages
    const scaledScores = {};
    const percentages = {};

    for (const [key, comp] of Object.entries(COMPETENCIES)) {
        // raw is 2-8 (2 scenarios, each 1-4 points)
        const raw = rawScores[key];
        const scaled = Math.round((raw / 8) * comp.max);
        scaledScores[key] = scaled;
        percentages[key] = Math.round((scaled / comp.max) * 1000) / 10;
    }

    // Behavioral metrics
    const allRTs = events.map(e => e.reaction_time_ms);
    const avgRT = allRTs.length > 0 ? Math.round(allRTs.reduce((a, b) => a + b, 0) / allRTs.length) : 0;

    // Find fastest/slowest competency by average RT
    let fastestComp = '', slowestComp = '', fastestRT = Infinity, slowestRT = 0;
    for (const [key, times] of Object.entries(reactionTimes)) {
        if (times.length === 0) continue;
        const avg = times.reduce((a, b) => a + b, 0) / times.length;
        if (avg < fastestRT) { fastestRT = avg; fastestComp = key; }
        if (avg > slowestRT) { slowestRT = avg; slowestComp = key; }
    }

    // Consistency index: based on standard deviation of scores across competencies
    const allPcts = Object.values(percentages);
    const pctMean = allPcts.reduce((a, b) => a + b, 0) / allPcts.length;
    const pctVariance = allPcts.reduce((sum, p) => sum + Math.pow(p - pctMean, 2), 0) / allPcts.length;
    const pctSD = Math.sqrt(pctVariance);
    const consistencyIndex = Math.max(0, Math.round((1 - pctSD / 100) * 100) / 100);

    const behavioralMetrics = {
        avg_decision_time_ms: avgRT,
        fastest_competency: fastestComp,
        slowest_competency: slowestComp,
        consistency_index: consistencyIndex
    };

    // Sort competencies by percentage for display
    const sorted = Object.entries(percentages).sort((a, b) => b[1] - a[1]);
    const top3 = sorted.slice(0, 3);
    const bottom3 = sorted.slice(-3).reverse();

    // Determine dominant trait
    const dominantTrait = sorted[0][0];
    const dominantName = COMPETENCIES[dominantTrait].name;

    // Save to Supabase
    try {
        // Save events
        if (events.length > 0 && sessionId) {
            await fetch(`${SUPABASE_URL}/rest/v1/game_events`, {
                method: 'POST', headers: HEADERS,
                body: JSON.stringify(events)
            });
        }

        // Save results
        const resultData = {
            session_id: sessionId,
            email: player.email,
            game_type: 'game_competencias',
            test_equivalent: 'competencias',
            scores: scaledScores,
            percentages: percentages,
            dominant_trait: dominantName,
            description: `Fortaleza principal: ${dominantName}. Promedio general: ${Math.round(pctMean)}%.`,
            behavioral_metrics: behavioralMetrics
        };

        await fetch(`${SUPABASE_URL}/rest/v1/game_results`, {
            method: 'POST', headers: HEADERS,
            body: JSON.stringify(resultData)
        });

        // Update session
        if (sessionId) {
            await fetch(`${SUPABASE_URL}/rest/v1/game_sessions?id=eq.${sessionId}`, {
                method: 'PATCH', headers: HEADERS,
                body: JSON.stringify({ status: 'completed', completed_at: new Date().toISOString(), duration_ms: totalDuration })
            });
        }
    } catch (e) { console.warn('Save failed:', e); }

    // Show results
    showResults(scaledScores, percentages, sorted, top3, bottom3, behavioralMetrics, pctMean);
}

function showResults(scaledScores, percentages, sorted, top3, bottom3, bm, avgPct) {
    const rs = document.getElementById('resultsScreen');
    rs.style.display = 'flex';

    // Build bars HTML sorted by score
    let barsHTML = '';
    sorted.forEach(([key, pct], i) => {
        const comp = COMPETENCIES[key];
        barsHTML += `
            <div class="result-bar">
                <div class="label">
                    <span class="comp-name">${comp.emoji} ${comp.name}</span>
                    <span class="comp-pct">${pct}%</span>
                </div>
                <div class="bar"><div class="bar-fill" style="width: 0%; background: ${comp.color};" data-pct="${pct}"></div></div>
            </div>`;
    });

    // Top 3 strengths
    let strengthsHTML = '';
    top3.forEach(([key, pct]) => {
        const comp = COMPETENCIES[key];
        strengthsHTML += `<div class="strength-item"><span class="s-icon">✅</span><span class="s-text"><strong>${comp.name}</strong> — ${pct}%</span></div>`;
    });

    // Bottom 3 areas to improve
    let improveHTML = '';
    bottom3.forEach(([key, pct]) => {
        const comp = COMPETENCIES[key];
        improveHTML += `<div class="strength-item"><span class="s-icon">📌</span><span class="s-text"><strong>${comp.name}</strong> — ${pct}%</span></div>`;
    });

    document.getElementById('resultsCard').innerHTML = `
        <h2>🏪 Resultados: Un Dia en la Tienda</h2>
        <p style="color:#94a3b8; margin-bottom:8px; font-size:0.95rem;">Puntuacion promedio: <strong style="color:#60a5fa;">${Math.round(avgPct)}%</strong></p>
        <p style="color:#64748b; margin-bottom:24px; font-size:0.85rem;">Evaluacion de 10 competencias profesionales</p>
        ${barsHTML}
        <div class="strengths-section">
            <h3>🏆 Top 3 Fortalezas</h3>
            ${strengthsHTML}
        </div>
        <div class="strengths-section">
            <h3>📈 3 Areas de Mejora</h3>
            ${improveHTML}
        </div>
        <div class="behavioral-stats">
            <h3>📊 Metricas Conductuales</h3>
            <div class="stat-row"><span class="stat-label">Tiempo promedio de decision</span><span class="stat-value">${(bm.avg_decision_time_ms / 1000).toFixed(1)}s</span></div>
            <div class="stat-row"><span class="stat-label">Competencia mas rapida</span><span class="stat-value">${COMPETENCIES[bm.fastest_competency]?.name || '-'}</span></div>
            <div class="stat-row"><span class="stat-label">Competencia mas lenta</span><span class="stat-value">${COMPETENCIES[bm.slowest_competency]?.name || '-'}</span></div>
            <div class="stat-row"><span class="stat-label">Indice de consistencia</span><span class="stat-value">${Math.round(bm.consistency_index * 100)}%</span></div>
        </div>
    `;

    // Animate bars
    setTimeout(() => {
        document.querySelectorAll('.bar-fill').forEach(bar => {
            bar.style.width = bar.dataset.pct + '%';
        });
    }, 200);
}
